
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDMS</title>
    <link rel="stylesheet" href="SDMS.css">
</head>
<body>
    <div>
        <h1>Student Database Management System</h1>
        <div id="fields">
            <input type="hidden" id="editIndex">
            <label>Student ID</label>
            <input type="text" id="studentId">
            <div class="error" id="idError"></div>
            <br>
            
            <label>Name</label>
            <input type="text" id="name">
            <div class="error" id="nameError"></div>
            <br>
            <label>Age</label>
            <input type="number" id="age">
            <div class="error" id="ageError"></div>
            <br>
            <label>Gender</label>
            <select id="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Others">Others</option>
            </select>
            <div class="error" id="genderError"></div>
            <br>
            <label>Grade</label>
            <input type="text" id="grade">
            <div class="error" id="gradeError"></div>
            <br>
            <label>Contact Number</label>
            <input type="text" id="contact" maxlength="10">
            <div class="error" id="contactError"></div>        
            <br>
            <br>
        </div>
        <div id="features">
            <button onclick="addStudent()">Add Student</button>
            <button onclick="searchStudent()">Search Student</button>
            <button onclick="showStudents()">Show Students</button>
            <button onclick="exitSystem()">Exit</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Grade</th>
                    <th>Contact</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
        <script src="SDMS.js"></script>
    </div>
    
</body>
</html>
